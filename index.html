<body>
<h1>文件 SHA-256 校验</h1>
<p>选择本地文件即可计算其 SHA-256 哈希值，用于核对网盘上传或下载前后的文件完整性。文件不会上传。</p>
<div class="card">
<p>选择本地文件，计算 SHA-256 校验值（用于校验网盘上传/下载完整性，不上传）：</p>
<input type="file" id="f">
<div id="out"></div>
<script>
var out=document.getElementById('out');
document.getElementById('f').onchange=function(e){var file=e.target.files[0];if(!file)return;out.textContent='计算中…';file.arrayBuffer().then(function(buf){return crypto.subtle.digest('SHA-256',buf)}).then(function(h){var hex=Array.prototype.map.call(new Uint8Array(h),function(b){return ('0'+b.toString(16)).slice(-2)}).join('');out.innerHTML='<p>文件：'+file.name+'（'+(file.size/1048576).toFixed(2)+' MB）</p><p>SHA-256：</p><code style="word-break:break-all">'+hex+'</code>'})}
</script>
</div>
